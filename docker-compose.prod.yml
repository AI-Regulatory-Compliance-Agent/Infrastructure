services:

  postgres:
    image: postgres:16-alpine
    container_name: compliance_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - compliance_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: compliance_redis
    volumes:
      - redis_data:/data
    networks:
      - compliance_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: compliance_backend
    env_file: .env
    # No public port — reachable only through the caddy reverse proxy
    # at /api/*. Reduces attack surface (was 0.0.0.0:8000).
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ../data:/app/data
      - complianceai_uploads:/data/uploads
    networks:
      - compliance_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        # API base URL baked into the bundle. "/api" (relative) makes
        # the browser call the same origin it loaded the page from —
        # caddy proxies /api/* to the backend. Works over both HTTP
        # and HTTPS with no CORS preflights.
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: compliance_frontend
    # No public port — served through the caddy reverse proxy.
    networks:
      - compliance_network
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: compliance_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # Let's Encrypt certificates persist here
      - caddy_config:/config
    networks:
      - compliance_network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  complianceai_uploads:
  caddy_data:
  caddy_config:

networks:
  compliance_network:
    driver: bridge
