services:

  postgres:
    image: postgres:16-alpine
    container_name: compliance_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - compliance_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: compliance_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - compliance_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: compliance_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - compliance_network

  ingestion:
    build:
      context: ../ingestion
      dockerfile: Dockerfile
    container_name: compliance_ingestion
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_search: []
    volumes:
      - ../data:/app/data
      - ./dns/resolv.conf:/etc/resolv.conf:ro
    networks:
      - compliance_network
    depends_on:
      qdrant:
        condition: service_started
    restart: "no"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: compliance_backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../backend/app:/app/app
      - ./dns/resolv.conf:/etc/resolv.conf:ro
      - complianceai_uploads:/data/uploads
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_search: []
    networks:
      - compliance_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: compliance_frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/index.html:/app/index.html
    networks:
      - compliance_network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  complianceai_uploads:

networks:
  compliance_network:
    driver: bridge