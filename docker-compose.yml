version: "3.9"

services:

  # ─── Infrastructure ───────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: compliance_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - compliance_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: compliance_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - compliance_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: compliance_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - compliance_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Ingestion ────────────────────────────────

  ingestion:
    build:
      context: ../ingestion
      dockerfile: Dockerfile
    container_name: compliance_ingestion
    env_file: .env
    volumes:
      - ../data:/app/data
    networks:
      - compliance_network
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"

  # ─── Backend ──────────────────────────────────

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: compliance_backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    networks:
      - compliance_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: compliance_frontend
    ports:
      - "3000:3000"
    networks:
      - compliance_network
    depends_on:
      - backend
    restart: unless-stopped

# ─── Volumes ──────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

# ─── Network ──────────────────────────────────

networks:
  compliance_network:
    driver: bridge